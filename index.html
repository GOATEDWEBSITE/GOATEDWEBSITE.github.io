<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Site</title>
    <style>
      :root { --ink: #18201b; --muted: #6b7280; --bg: #ffffff; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.6;
      }
      nav { padding: 24px 32px; font-weight: 700; }
      main { max-width: 680px; margin: 0 auto; padding: 8vh 24px; }
      h1 { font-size: 2.4rem; margin: 0 0 16px; }
      p { color: var(--muted); font-size: 1.1rem; }
    </style>
  </head>
  <body>
    <nav>My Site</nav>
    <main>
      <h1>Hello, world.</h1>
      <p>This is your blank canvas. Click any text to edit it, or use the toolbar to add sections, images, and pages. Make it yours.</p>
    </main>
  </body>
</html>
